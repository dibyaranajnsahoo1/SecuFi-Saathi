<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecuFi Saathi</title>
  <style>
    body {
      margin: 0;
      padding: 24px 12px;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f3f6ff 0%, #f8f9fb 100%);
      color: #1b2430;
    }
    .shell {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e3e7ee;
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(14, 26, 50, 0.08);
      overflow: hidden;
    }
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #edf1f7;
      background: #0c1f4a;
      color: #ffffff;
    }
    .header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }
    .header p {
      margin: 4px 0 0 0;
      font-size: 13px;
      opacity: 0.9;
    }
    #chat {
      height: 460px;
      overflow-y: auto;
      padding: 16px;
      background: #fbfcff;
    }
    .bubble-wrap {
      margin: 10px 0;
      display: flex;
      flex-direction: column;
      max-width: 86%;
    }
    .bubble-wrap.user {
      margin-left: auto;
      align-items: flex-end;
    }
    .bubble-wrap.bot {
      margin-right: auto;
      align-items: flex-start;
    }
    .sender {
      font-size: 12px;
      margin-bottom: 4px;
      color: #5d6a7f;
      font-weight: 600;
    }
    .msg {
      white-space: pre-wrap;
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.5;
      font-size: 14px;
      border: 1px solid #dde4f1;
    }
    .bubble-wrap.user .msg {
      background: #e7f1ff;
      border-color: #bed5ff;
    }
    .bubble-wrap.bot .msg {
      background: #f4f6fb;
      border-color: #dfe4ef;
    }
    .typing {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      min-height: 14px;
    }
    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6c768a;
      opacity: 0.35;
      animation: blink 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }
    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.35; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-1px); }
    }
    #row {
      padding: 12px;
      display: flex;
      gap: 8px;
      border-top: 1px solid #edf1f7;
      background: #ffffff;
    }
    input {
      flex: 1;
      padding: 11px 12px;
      border: 1px solid #ced7e6;
      border-radius: 10px;
      font-size: 14px;
    }
    button {
      padding: 11px 14px;
      border: 0;
      border-radius: 10px;
      background: #0c1f4a;
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #0f2a64;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <h2>SecuFi Saathi</h2>
      <p>Your household protection assistant</p>
    </div>
    <div id="chat"></div>
    <div id="row">
      <input id="input" placeholder="Tell me about your family finances..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script>
    let sessionId = null;
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');

    function add(role, text) {
      const wrap = document.createElement('div');
      wrap.className = `bubble-wrap ${role}`;

      const sender = document.createElement('div');
      sender.className = 'sender';
      sender.textContent = role === 'user' ? 'You' : 'SecuFi Saathi';

      const bubble = document.createElement('div');
      bubble.className = 'msg';
      bubble.textContent = text;

      wrap.appendChild(sender);
      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    add('bot', 'Namaste! I am SecuFi Saathi. Share your household income, expenses, savings, and current insurance cover when you are ready.');

    function addTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap bot';
      wrap.id = 'typing-indicator';

      const sender = document.createElement('div');
      sender.className = 'sender';
      sender.textContent = 'SecuFi Saathi';

      const bubble = document.createElement('div');
      bubble.className = 'msg';
      bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

      wrap.appendChild(sender);
      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;
      input.value = '';
      add('user', message);
      addTyping();
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, session_id: sessionId })
        });
        const data = await res.json();
        removeTyping();
        if (!res.ok) {
          const detail = data?.detail || 'Something went wrong. Please try again.';
          add('bot', `I hit an error: ${detail}`);
          return;
        }
        sessionId = data.session_id;
        add('bot', data.reply);
      } catch (error) {
        removeTyping();
        add('bot', 'I could not reach the server. Please check if backend is running.');
      }
    }

    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        sendMessage();
      }
    });
  </script>
</body>
</html>
